name: Java CI with Maven

on: [push] # Tells GitHub to run this every time you save code

jobs:
  build:
    runs-on: ubuntu-latest # Gives you a clean virtual computer

    steps:
    - uses: actions/checkout@v4 # Step 1: Grabs your code from GitHub

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # Step 2: Installs Java
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package # Step 3: Compiles your code and runs your JUnit tests
